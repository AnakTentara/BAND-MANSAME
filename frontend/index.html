          <h2>Tentang MANSAME Band</h2>
          <p>MANSAME Band adalah wadah penyaluran kreativitas, minat, dan bakat bermusik siswa MAN 1 Muara Enim. Kami fokus pada pembinaan vokal, instrumen (gitar, bass, drum, keyboard), aransemen, dan penampilan langsung.</p>
          <p>Berlokasi di MAN 1 Muara Enim, Jl. K.H. Ahmad Dahlan, Pasar III, Muara Enim, Sumatera Selatan 31311.</p>
        </section>
        <section>
          <h2>Program & Kegiatan Kami</h2>
          <p>Kami rutin mengadakan latihan di studio sekolah, mengisi berbagai pentas seni (pensi), upacara bendera, perayaan hari besar nasional, dan mengikuti festival musik serta perlombaan grup band antar pelajar tingkat kabupaten/provinsi.</p>
